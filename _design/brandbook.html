  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

solid var(--n200); }\n  .eyebrow { display:inline-flex; align-items:center; gap:10px; font-size:13px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--teal-400); margin-bottom:20px; }\n  .eyebrow.dark { color:var(--teal); }\n  .eyebrow .dash { width:26px; height:2px; background:currentColor; border-radius:1px; }\n  h1 { font-size:clamp(44px,6vw,84px); font-weight:800; letter-spacing:-0.03em; line-height:1.0; }\n  h2 { font-size:clamp(30px,3.6vw,46px); font-weight:700; letter-spacing:-0.025em; line-height:1.08; margin-bottom:18px; }\n  h3 { font-size:22px; font-weight:700; letter-spacing:-0.01em; margin-bottom:10px; }\n  .lead { font-size:19px; line-height:1.65; color:#8aa3a2; max-width:680px; }\n  .light .lead { color:var(--n600); }\n  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:28px; }\n  .grid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }\n  .grid4 { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; }\n  .mt48{margin-top:48px;} .mt32{margin-top:32px;} .mt24{margin-top:24px;}\n  .mono { font-family:'JetBrains Mono','Courier New',monospace; }\n  @media(max-width:820px){ .wrap{padding:0 28px;} .grid2,.grid3{grid-template-columns:1fr;} .grid4{grid-template-columns:1fr 1fr;} section{padding:64px 0;} }\n\n  /* cover */\n  #cover { min-height:100vh; display:flex; flex-direction:column; justify-content:center; position:relative; overflow:hidden; }\n  #cover .arc{ position:absolute; right:-140px; top:50%; transform:translateY(-50%); width:680px; height:680px; border:84px solid var(--teal); opacity:0.16; border-radius:50%; }\n  #cover .arc2{ position:absolute; right:90px; top:50%; transform:translateY(-50%); width:380px; height:380px; border:56px solid var(--teal); opacity:0.1; border-radius:50%; }\n  #cover .logo{ height:34px; filter:brightness(0) invert(1); margin-bottom:56px; }\n  #cover .meta{ position:absolute; bottom:48px; left:0; right:0; }\n\n  /* color swatches */\n  .swatch { border-radius:14px; overflow:hidden; border:1px solid rgba(0,0,0,0.06); }\n  .swatch .chip { height:96px; display:flex; align-items:flex-end; padding:12px 14px; }\n  .swatch .info { padding:12px 14px; background:#fff; }\n  .swatch .nm { font-size:14px; font-weight:700; color:var(--n900); }\n  .swatch .hex { font-size:12px; color:var(--n400); }\n  .scale { display:flex; border-radius:12px; overflow:hidden; height:80px; }\n  .scale > div { flex:1; display:flex; align-items:flex-end; padding:8px; font-size:10px; font-weight:600; }\n\n  /* type specimen */\n  .specimen { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); border-radius:18px; padding:36px; }\n  .light .specimen { background:var(--n50); border-color:var(--n200); }\n  .cmp-card { border:1px solid rgba(255,255,255,0.1); border-radius:16px; padding:26px; background:rgba(255,255,255,0.02); }\n  .cmp-card.chosen { border-color:var(--teal-400); background:rgba(42,159,158,0.07); }\n  .badge { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:700; padding:4px 11px; border-radius:999px; }\n  .badge.lock { background:var(--teal); color:#fff; }\n  .badge.alt { background:rgba(255,255,255,0.07); color:#9fb6b5; border:1px solid rgba(255,255,255,0.12); }\n\n  .typerow { display:flex; align-items:baseline; gap:20px; padding:16px 0; border-bottom:1px solid rgba(255,255,255,0.07); }\n  .typerow .tag { font-size:11px; color:var(--n400); min-width:120px; font-family:'JetBrains Mono',monospace; flex-shrink:0; }\n  .light .typerow{ border-bottom:1px solid var(--n200); }\n\n  /* logo blocks */\n  .logobox { border-radius:16px; display:flex; align-items:center; justify-content:center; height:150px; }\n  .misuse { border-radius:14px; overflow:hidden; border:1px solid var(--n200); }\n  .misuse .vis{ height:120px; display:flex; align-items:center; justify-content:center; background:var(--n50); position:relative; }\n  .misuse .cap{ padding:11px 14px; font-size:13px; display:flex; align-items:center; gap:8px; }\n  .x{ color:#b83232; font-weight:800; } .ok{ color:#1a7a50; font-weight:800; }\n\n  /* icon tiles */\n  .icontile{ display:flex; flex-direction:column; align-items:center; gap:10px; padding:22px 10px; border:1px solid rgba(255,255,255,0.08); border-radius:14px; background:rgba(255,255,255,0.02); }\n  .icontile span{ font-size:12px; color:#8aa3a2; }\n\n  /* voice cards */\n  .vcard{ border-radius:14px; padding:22px 24px; }\n  .vcard.do{ background:rgba(40,180,110,0.08); border:1px solid rgba(40,180,110,0.25); }\n  .vcard.dont{ background:rgba(184,50,50,0.07); border:1px solid rgba(184,50,50,0.22); }\n  .vcard .h{ font-size:13px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; margin-bottom:14px; display:flex; align-items:center; gap:8px; }\n\n  /* component preview */\n  .btn{ font-family:'Manrope',sans-serif; font-weight:600; border-radius:10px; cursor:default; border:none; display:inline-flex; align-items:center; gap:8px; }\n  .btn.primary{ background:var(--teal); color:#fff; padding:12px 22px; font-size:15px; }\n  .btn.outline{ background:transparent; color:var(--teal); border:1.5px solid var(--teal); padding:11px 22px; font-size:15px; }\n  .pill{ display:inline-flex; align-items:center; padding:4px 12px; border-radius:999px; font-size:13px; font-weight:600; }\n\n  .toc { display:flex; gap:8px; flex-wrap:wrap; margin-top:40px; }\n  .toc a { font-size:13px; color:#8aa3a2; text-decoration:none; padding:8px 15px; border:1px solid rgba(255,255,255,0.12); border-radius:999px; transition:all .15s; }\n  .toc a:hover{ color:#fff; border-color:var(--teal-400); }\n  .num{ font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--teal-400); font-weight:600; letter-spacing:0.05em; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- COVER -->\n<section id=\"cover\">\n  <div class=\"arc\"><\u002Fdiv><div class=\"arc2\"><\u002Fdiv>\n  <div class=\"wrap\" style=\"position:relative;z-index:1;\">\n    <img src=\"09d63a10-9c65-4108-b021-5d06ce9f9227\" class=\"logo\" alt=\"Cashes Green Rus\">\n    <div class=\"eyebrow\"><span class=\"dash\"><\u002Fspan>Брендбук · Версия 1.0 · 2026<\u002Fdiv>\n    <h1>Фирменный<br>стиль <span style=\"color:var(--teal-100);\">CGR<\u002Fspan><\u002Fh1>\n    <p class=\"lead mt24\">Руководство по визуальной идентике Кэшес Грин Рус — логотип, цвет, типографика, иконография и тон коммуникации. Технологический дистрибьютор серверного и AI-оборудования.<\u002Fp>\n    <div class=\"toc\">\n      <a href=\"#logo\">01 — Логотип<\u002Fa>\n      <a href=\"#color\">02 — Цвет<\u002Fa>\n      <a href=\"#type\">03 — Типографика<\u002Fa>\n      <a href=\"#icons\">04 — Иконография<\u002Fa>\n      <a href=\"#voice\">05 — Тон<\u002Fa>\n      <a href=\"#layout\">06 — Сетка и стиль<\u002Fa>\n      <a href=\"#components\">07 — Компоненты<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"meta wrap\"><span style=\"font-size:13px;color:#4a6362;\">ООО «КЭШЕС ГРИН РУС» · Москва · cashesgreen.ru<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<!-- LOGO -->\n<section id=\"logo\" class=\"light\">\n  <div class=\"wrap\">\n    <div class=\"eyebrow dark\"><span class=\"dash\"><\u002Fspan>01 — Логотип<\u002Fdiv>\n    <h2>Знак и логотип<\u002Fh2>\n    <p class=\"lead\">Основа айдентики — горизонтальный логотип. Используйте его как первичную форму. Знак (иконка) — для компактных пространств и аватаров.<\u002Fp>\n\n    <div class=\"grid2 mt48\">\n      <div class=\"logobox\" style=\"background:#fff;border:1px solid var(--n200);\">\n        <img src=\"09d63a10-9c65-4108-b021-5d06ce9f9227\" style=\"height:40px;\" alt=\"logo\">\n      <\u002Fdiv>\n      <div class=\"logobox\" style=\"background:var(--n900);\">\n        <img src=\"09d63a10-9c65-4108-b021-5d06ce9f9227\" style=\"height:40px;filter:brightness(0) invert(1);\" alt=\"logo\">\n      <\u002Fdiv>\n      <div class=\"logobox\" style=\"background:var(--teal);\">\n        <img src=\"09d63a10-9c65-4108-b021-5d06ce9f9227\" style=\"height:40px;filter:brightness(0) invert(1);\" alt=\"logo\">\n      <\u002Fdiv>\n      <div class=\"logobox\" style=\"background:var(--n50);border:1px solid var(--n200);gap:24px;\">\n        <img src=\"49ff2ddf-8581-437a-8585-2d7244fbab68\" style=\"height:64px;border-radius:12px;\" alt=\"icon\">\n        <img src=\"49ff2ddf-8581-437a-8585-2d7244fbab68\" style=\"height:40px;border-radius:8px;\" alt=\"icon\">\n        <img src=\"49ff2ddf-8581-437a-8585-2d7244fbab68\" style=\"height:28px;border-radius:6px;\" alt=\"icon\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3 class=\"mt48\">Охранное поле и минимальный размер<\u002Fh3>\n    <p class=\"lead\" style=\"font-size:16px;\">Сохраняйте свободное пространство вокруг логотипа не менее половины высоты знака. Минимальная высота логотипа — 18px на экране, 8мм в печати.<\u002Fp>\n\n    <h3 class=\"mt48\">Чего нельзя делать<\u002Fh3>\n    <div class=\"grid4 mt24\">\n      <div class=\"misuse\"><div class=\"vis\"><img src=\"09d63a10-9c65-4108-b021-5d06ce9f9227\" style=\"height:26px;transform:rotate(-8deg);\" alt=\"\"><\u002Fdiv><div class=\"cap\"><span class=\"x\">✕<\u002Fspan> Не наклоняйте<\u002Fdiv><\u002Fdiv>\n      <div class=\"misuse\"><div class=\"vis\" style=\"background:#cf0a2c;\"><img src=\"09d63a10-9c65-4108-b021-5d06ce9f9227\" style=\"height:26px;filter:brightness(0) invert(1);\" alt=\"\"><\u002Fdiv><div class=\"cap\"><span class=\"x\">✕<\u002Fspan> Не меняйте цвет фона произвольно<\u002Fdiv><\u002Fdiv>\n      <div class=\"misuse\"><div class=\"vis\"><img src=\"09d63a10-9c65-4108-b021-5d06ce9f9227\" style=\"height:18px;transform:scaleX(1.6);\" alt=\"\"><\u002Fdiv><div class=\"cap\"><span class=\"x\">✕<\u002Fspan> Не растягивайте<\u002Fdiv><\u002Fdiv>\n      <div class=\"misuse\"><div class=\"vis\" style=\"background:linear-gradient(90deg,#f0a,#0af);\"><img src=\"09d63a10-9c65-4108-b021-5d06ce9f9227\" style=\"height:26px;\" alt=\"\"><\u002Fdiv><div class=\"cap\"><span class=\"x\">✕<\u002Fspan> Не на пёстром фоне<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- COLOR -->\n<section id=\"color\">\n  <div class=\"wrap\">\n    <div class=\"eyebrow\"><span class=\"dash\"><\u002Fspan>02 — Цвет<\u002Fdiv>\n    <h2 style=\"color:#fff;\">Палитра<\u002Fh2>\n    <p class=\"lead\">Фирменный цвет — глубокий бирюзовый <b style=\"color:var(--teal-100);\">#005A59<\u002Fb>. Он выражает доверие, стабильность и точность. Тёмные нейтрали формируют премиальную основу.<\u002Fp>\n\n    <div class=\"grid4 mt48\">\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#005A59;\"><span style=\"color:#fff;font-size:11px;font-weight:700;\">★ ОСНОВНОЙ<\u002Fspan><\u002Fdiv><div class=\"info\"><div class=\"nm\">Brand Teal<\u002Fdiv><div class=\"hex mono\">#005A59 · cgr-600<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#2a9f9e;\"><\u002Fdiv><div class=\"info\"><div class=\"nm\">Teal Accent<\u002Fdiv><div class=\"hex mono\">#2a9f9e · cgr-400<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#0e1818;\"><\u002Fdiv><div class=\"info\"><div class=\"nm\">Ink<\u002Fdiv><div class=\"hex mono\">#0e1818 · neutral-900<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#07111a;\"><\u002Fdiv><div class=\"info\"><div class=\"nm\">Premium Dark<\u002Fdiv><div class=\"hex mono\">#07111a · canvas<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3 class=\"mt48\" style=\"color:#fff;\">Бирюзовая шкала<\u002Fh3>\n    <div class=\"scale mt24\">\n      <div style=\"background:#e8f5f5;color:#005A59;\">50<\u002Fdiv>\n      <div style=\"background:#c3e6e5;color:#005A59;\">100<\u002Fdiv>\n      <div style=\"background:#92d1d0;color:#005A59;\">200<\u002Fdiv>\n      <div style=\"background:#5bb8b7;color:#fff;\">300<\u002Fdiv>\n      <div style=\"background:#2a9f9e;color:#fff;\">400<\u002Fdiv>\n      <div style=\"background:#007a78;color:#fff;\">500<\u002Fdiv>\n      <div style=\"background:#005A59;color:#fff;\">600<\u002Fdiv>\n      <div style=\"background:#004342;color:#fff;\">700<\u002Fdiv>\n      <div style=\"background:#002c2b;color:#fff;\">800<\u002Fdiv>\n      <div style=\"background:#001717;color:#fff;\">900<\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3 class=\"mt48\" style=\"color:#fff;\">Семантические цвета<\u002Fh3>\n    <div class=\"grid4 mt24\">\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#1a7a50;\"><\u002Fdiv><div class=\"info\"><div class=\"nm\">Success<\u002Fdiv><div class=\"hex mono\">#1a7a50<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#b83232;\"><\u002Fdiv><div class=\"info\"><div class=\"nm\">Error<\u002Fdiv><div class=\"hex mono\">#b83232<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#b87820;\"><\u002Fdiv><div class=\"info\"><div class=\"nm\">Warning<\u002Fdiv><div class=\"hex mono\">#b87820<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#1e5a9a;\"><\u002Fdiv><div class=\"info\"><div class=\"nm\">Info<\u002Fdiv><div class=\"hex mono\">#1e5a9a<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- TYPOGRAPHY -->\n<section id=\"type\" class=\"light\">\n  <div class=\"wrap\">\n    <div class=\"eyebrow dark\"><span class=\"dash\"><\u002Fspan>03 — Типографика<\u002Fdiv>\n    <h2>Фирменный шрифт — Manrope<\u002Fh2>\n    <p class=\"lead\">Мы выбрали <b>Manrope<\u002Fb> как основной шрифт бренда. Геометричная конструкция читается как точность и инженерная аккуратность — идеально для дистрибьютора серверного оборудования. Полная поддержка кириллицы, премиальное звучание в крупных размерах.<\u002Fp>\n\n    <!-- comparison -->\n    <h3 class=\"mt48\">Почему Manrope — сравнение кандидатов<\u002Fh3>\n    <div class=\"grid3 mt24\">\n      <div class=\"cmp-card chosen\" style=\"background:#fff;border-color:var(--teal-400);\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;\">\n          <span class=\"badge lock\">✓ Выбран<\u002Fspan>\n          <span class=\"mono\" style=\"font-size:12px;color:var(--n400);\">Manrope<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-family:'Manrope';font-weight:800;font-size:40px;letter-spacing:-0.02em;color:var(--n900);line-height:1;\">Сервер<\u002Fdiv>\n        <div style=\"font-family:'Manrope';font-size:15px;color:var(--n600);margin-top:12px;line-height:1.5;\">Геометричный, премиальный, инженерная точность. AaЯя 0123<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cmp-card\" style=\"background:#fff;border-color:var(--n200);\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;\">\n          <span class=\"badge alt\" style=\"background:var(--n100);color:var(--n600);border-color:var(--n200);\">Запасной<\u002Fspan>\n          <span class=\"mono\" style=\"font-size:12px;color:var(--n400);\">Onest<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-family:'Onest';font-weight:700;font-size:40px;letter-spacing:-0.02em;color:var(--n900);line-height:1;\">Сервер<\u002Fdiv>\n        <div style=\"font-family:'Onest';font-size:15px;color:var(--n600);margin-top:12px;line-height:1.5;\">Тёплый, кириллический, дружелюбный. AaЯя 0123<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cmp-card\" style=\"background:#fff;border-color:var(--n200);\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;\">\n          <span class=\"badge alt\" style=\"background:var(--n100);color:var(--n600);border-color:var(--n200);\">Рассмотрен<\u002Fspan>\n          <span class=\"mono\" style=\"font-size:12px;color:var(--n400);\">Golos Text<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-family:'Golos Text';font-weight:700;font-size:40px;letter-spacing:-0.02em;color:var(--n900
