version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cgr_shop
      POSTGRES_USER: cgr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cgr -d cgr_shop"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://cgr:${POSTGRES_PASSWORD}@db:5432/cgr_shop
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      AUTH_SECRET: ${AUTH_SECRET}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - internal
      - web

  # One-off migration + seed service (run manually: docker compose run --rm migrate)
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://cgr:${POSTGRES_PASSWORD}@db:5432/cgr_shop
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      AUTH_SECRET: ${AUTH_SECRET}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    command: >
      sh -c "npx prisma migrate deploy && npm run seed"
    networks:
      - internal
    profiles:
      - tools

volumes:
  pgdata:

networks:
  internal:
    internal: true
  web:
